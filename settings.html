<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Ustawienia Konta</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }
    h1 { margin-top: 0; }
    form { display: flex; flex-direction: column; gap: 15px; }
    label { display: flex; flex-direction: column; font-weight: bold; }
    input, select { padding: 8px; font-size: 1em; }
    button { width: 120px; padding: 10px; margin-top: 10px; }
    .note { font-size: 0.9em; color: #555; }
    a { text-decoration: none; color: #007ACC; }
  
/* ==== NOWOCZESNY MOTYW APLIKACJI ==== */
:root {
  --bg: #020617;
  --bg-soft: #0f172a;
  --card-bg: #020617;
  --accent: #38bdf8;
  --accent-soft: rgba(56, 189, 248, 0.18);
  --accent-strong: #0ea5e9;
  --danger: #f97373;
  --success: #22c55e;
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
  --border-subtle: #1f2937;
}

* {
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* tło i typografia dla stron */
body.has-sidebar,
body.simple-page {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.25) 0, transparent 45%),
    radial-gradient(circle at 100% 100%, rgba(34, 197, 94, 0.25) 0, transparent 45%),
    var(--bg);
  color: var(--text-main);
}

/* układ z panelem bocznym - widok główny */
body.has-sidebar {
  display: flex;
  align-items: flex-start;
}

/* główny panel */
body.has-sidebar #main {
  flex: 1;
  max-width: 1200px;
  margin: 24px auto;
  padding: 24px 32px 40px;
  background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 55%),
              radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.10), transparent 55%),
              linear-gradient(135deg, #020617, #020617);
  border-radius: 24px;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
}

/* panel boczny */
#sidebar {
  width: 260px;
  padding: 24px 20px;
  border-left: none;
  background: rgba(15, 23, 42, 0.98);
  box-shadow: -1px 0 0 var(--border-subtle);
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 100vh;
  position: sticky;
  top: 0;
}

#sidebar h2,
#sidebar h3 {
  margin-top: 0;
  color: var(--text-main);
}

#sidebar a {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  text-decoration: none;
  color: var(--text-main);
  font-size: 0.9rem;
  transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
}

#sidebar a:hover {
  background: var(--accent-soft);
  color: var(--accent-strong);
  transform: translateX(2px);
}

/* karty / sekcje wewnątrz głównego panelu */
.section, #overviewSection, #myReservationsSection, #adminPanel {
  background: rgba(15, 23, 42, 0.95);
  border-radius: 20px;
  padding: 16px 18px 18px;
  margin-bottom: 16px;
  border: 1px solid var(--border-subtle);
}

/* tabela list rezerwacji */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

th, td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border-subtle);
}

th {
  text-align: left;
  color: var(--text-muted);
  font-weight: 500;
}

/* pola formularzy i przyciski */
input, select {
  border-radius: 999px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-soft);
  color: var(--text-main);
  padding: 8px 14px;
  font-size: 0.9rem;
  outline: none;
}

input::placeholder {
  color: var(--text-muted);
}

button {
  border-radius: 999px;
  border: none;
  padding: 8px 16px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: #020617;
  box-shadow: 0 10px 25px rgba(15, 23, 42, 0.8);
  transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(1.05);
  box-shadow: 0 14px 35px rgba(0, 0, 0, 0.9);
}

button:active {
  transform: translateY(0);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.7);
}

/* linki w treści */
a {
  color: var(--accent);
}

/* kafelki biurek */
.box {
  border-radius: 18px;
  background: radial-gradient(circle at top, rgba(148, 163, 184, 0.25), transparent 55%),
              rgba(15, 23, 42, 0.95);
  border: 1px solid var(--border-subtle);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
  transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
}

.box:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--accent);
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8);
}

/* statusy biurek */
.free     { background: linear-gradient(135deg, rgba(34, 197, 94, 0.22), rgba(21, 128, 61, 0.96)); }
.occupied { background: linear-gradient(135deg, rgba(249, 115, 22, 0.22), rgba(194, 65, 12, 0.96)); cursor: not-allowed; }
.reserved { background: linear-gradient(135deg, rgba(250, 204, 21, 0.27), rgba(161, 98, 7, 0.96)); cursor: not-allowed; }
.disabled { background: rgba(15, 23, 42, 0.9); color: #6b7280; cursor: not-allowed; }

/* link-tile na sidebarze / w głównym widoku */
.link-tile {
  background: var(--accent-soft);
  border-radius: 18px;
  padding: 10px 12px;
  border: 1px solid rgba(56, 189, 248, 0.35);
}

/* proste karty statystyk / info */
.stat-card, .info-card {
  background: rgba(15, 23, 42, 0.96);
  border-radius: 18px;
  padding: 14px 16px;
  border: 1px solid var(--border-subtle);
}

/* widoki prostych podstron (ustawienia, statystyki, pomoc, kalendarz) */
body.simple-page {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px;
}

body.simple-page .page-shell {
  width: 100%;
  max-width: 960px;
  background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 55%),
              radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.10), transparent 55%),
              linear-gradient(135deg, #020617, #020617);
  border-radius: 24px;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
  padding: 24px 28px 36px;
}

/* responsywność */
@media (max-width: 960px) {
  body.has-sidebar {
    flex-direction: column;
  }
  #sidebar {
    width: 100%;
    min-height: auto;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 8px;
  }
  body.has-sidebar #main {
    margin: 12px 12px 24px;
    padding: 18px 16px 24px;
  }
}
</style>
</head>
<body class="simple-page">
  <div class="page-shell">

  <h1>Ustawienia</h1>
  <p><a href="index.html">← Powrót do panelu głównego</a></p>
  <form id="settingsForm">
    <label>
      Zmień nazwę użytkownika
      <input type="text" id="usernameInput" placeholder="Twoje imię">
    </label>

    <label>
      Domyślny czas rezerwacji
      <select id="defaultDuration">
        <option value="1">1 godzina</option>
        <option value="2">2 godziny</option>
        <option value="3">3 godziny</option>
      </select>
      <span class="note">Wybierz, ile godzin ma trwać rezerwacja domyślnie.</span>
    </label>

    <label>
      Powiadomienia e-mail
      <select id="notifications">
        <option value="on">Włączone</option>
        <option value="off">Wyłączone</option>
      </select>
    </label>

    <button type="button" id="saveSettings">Zapisz ustawienia</button>
  </form>

  <script>
    const API_BASE = 'http://127.0.0.1:5000';

    async function ensureAuth() {
      try {
        const res = await fetch(API_BASE + '/api/me', { credentials: 'include' });
        if (!res.ok) {
          window.location.href = 'index.html';
          return null;
        }
        const data = await res.json();
        return data.username;
      } catch (e) {
        window.location.href = 'index.html';
        return null;
      }
    }

    async function loadSettings(username) {
      document.getElementById('usernameInput').value = username;
      document.getElementById('usernameInput').readOnly = true;

      const res = await fetch(API_BASE + '/api/settings', { credentials: 'include' });
      if (!res.ok) return;
      const data = await res.json();
      if (data.defaultDuration) document.getElementById('defaultDuration').value = data.defaultDuration;
      if (data.notifications) document.getElementById('notifications').value = data.notifications;
    }

    async function saveSettings() {
      const d = document.getElementById('defaultDuration').value;
      const n = document.getElementById('notifications').value;
      const res = await fetch(API_BASE + '/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ defaultDuration: d, notifications: n })
      });
      if (res.ok) {
        alert('Ustawienia zapisane.');
      } else {
        alert('Nie udało się zapisać ustawień.');
      }
    }

    document.getElementById('saveSettings').addEventListener('click', saveSettings);

    (async () => {
      const u = await ensureAuth();
      if (u) await loadSettings(u);
    })();
  </script>
  </div>
</body>
</html>
